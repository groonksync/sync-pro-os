name: Build & Release
on:
  push:
    tags: [ 'v*' ]
jobs:
  release:
    runs-on: macos-latest
    env:
      CI: false
      ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm install
          npx electron-rebuild 2>/dev/null || true
      - name: Build Vite
        run: npx vite build
      - name: Build Electron DMG
        run: |
          npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare DMG for release
        run: |
          ls -la release/ || true
          ls -la release/mac-arm64/ || true
          mkdir -p release
          cp -R "release/mac-arm64/Inefable.app" "./Inefable.app" 2>/dev/null || true
      - uses: softprops/action-gh-release@v1
        if: success()
        with:
          files: |
            release/*.dmg
            release/*.blockmap
            release/latest-mac.yml
            release/mac-arm64/*.dmg
            release/mac-arm64/*.blockmap
            release/mac-arm64/latest-mac.yml
          generate_release_notes: true
          make_latest: true
